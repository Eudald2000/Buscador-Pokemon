<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top half (red) -->
  <path d="M 50 5 A 45 45 0 0 1 95 50 L 50 50 Z" fill="#e3350d"/>
  <path d="M 5 50 A 45 45 0 0 1 50 5 L 50 50 Z" fill="#e3350d"/>
  <!-- Bottom half (white) -->
  <path d="M 95 50 A 45 45 0 0 1 5 50 L 50 50 Z" fill="#ffffff"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Center divider line -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Center button outer -->
  <circle cx="50" cy="50" r="12" fill="#1a1a1a"/>
  <!-- Center button inner -->
  <circle cx="50" cy="50" r="8" fill="#ffffff"/>
  <!-- Center button shine -->
  <circle cx="47" cy="47" r="2.5" fill="#cccccc"/>
</svg>
